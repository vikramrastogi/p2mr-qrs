name: Benchmark reproduction report
description: Submit an independent QRS native benchmark rerun.
title: "Benchmark reproduction: <hardware / OS>"
labels:
  - benchmark
  - review
body:
  - type: markdown
    attributes:
      value: |
        Please run the protocol in `docs/reproducibility/reproducibility.md` and attach the generated JSON and Markdown artifacts.
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.x / Ubuntu 24.04 / ...
    validations:
      required: true
  - type: input
    id: cpu
    attributes:
      label: CPU
      placeholder: Apple M2 Pro / Intel Xeon ... / AMD ...
    validations:
      required: true
  - type: input
    id: compiler
    attributes:
      label: Compiler
      placeholder: clang 17.0.0 / gcc 14.2.0 / ...
    validations:
      required: true
  - type: input
    id: compiler_flags
    attributes:
      label: Compiler flags
      placeholder: -O3 -Wall -Wextra -Wpedantic
    validations:
      required: true
  - type: input
    id: openssl
    attributes:
      label: OpenSSL version/provider
      placeholder: OpenSSL 3.6.1, default provider, SLH-DSA-SHA2-128s available
    validations:
      required: true
  - type: input
    id: secp256k1_commit
    attributes:
      label: libsecp256k1 commit
      placeholder: aea86bc3509f3ceb5c047fe6567bf8910f72a728
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Benchmark mode
      options:
        - quick
        - standard
        - full
    validations:
      required: true
  - type: dropdown
    id: release_check
    attributes:
      label: Did release_check.sh pass?
      options:
        - "yes"
        - "no"
    validations:
      required: true
  - type: input
    id: batch_status
    attributes:
      label: Batch status
      placeholder: reviewed public unavailable; experimental available
    validations:
      required: true
  - type: textarea
    id: json_attachment
    attributes:
      label: JSON attachment
      description: Attach or link `out/full.json` or `out/quick.json`, plus `out/resource-accounting-decision.json`.
      placeholder: Attach files or paste durable links.
    validations:
      required: true
  - type: textarea
    id: markdown_attachment
    attributes:
      label: Markdown attachment
      description: Attach or link `out/full.md` or `out/quick.md`, plus `out/resource-accounting-decision.md`.
      placeholder: Attach files or paste durable links.
    validations:
      required: true
  - type: textarea
    id: p99
    attributes:
      label: p99 saturated-block estimates
      description: Paste the p99 values from `out/resource-accounting-decision.md`.
      placeholder: |
        qrs_valid_saturated_block=...
        qrs_worst_invalid_fixed_length_saturated_block=...
        individual_schnorr_saturated_block=...
        experimental_batch_schnorr_saturated_block=...
        reviewed_public_batch_schnorr_saturated_block=...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any deviations from the reproducibility protocol or unusual local conditions.
    validations:
      required: false
